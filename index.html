<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOD — 인플루언서 패션 AI 모델 제작</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0a0a;color:#f0ece4;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;min-height:100%;width:100%;}
#root{width:100%;min-height:100vh;display:flex;justify-content:center;background:#0a0a0a;}
.shell{width:100%;max-width:1060px;min-height:100vh;background:#0a0a0a;box-sizing:border-box;text-align:center;}
.inner{padding:0 50px;width:100%;box-sizing:border-box;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px 20px 0;box-sizing:border-box;}
.hero-bg{position:relative;background-image:linear-gradient(rgba(204,255,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(204,255,0,.03) 1px,transparent 1px);background-size:40px 40px;}
.hero-bg::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(204,255,0,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
.section-num{font-size:11px;color:rgba(204,255,0,.45);font-weight:700;letter-spacing:4px;margin-bottom:6px;}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.photo-card::after,.video-card::after{content:"";position:absolute;inset:0;border-radius:14px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.5),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;}
.photo-card{position:relative;padding-top:177.78%;background:#111;border-radius:18px;overflow:hidden;border:1px solid rgba(240,236,228,.1);cursor:pointer;transition:border-color .3s,transform .3s;}
.photo-card:hover{border-color:rgba(204,255,0,.4);transform:translateY(-6px);}
.photo-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.video-card{position:relative;padding-top:177.78%;background:#111;border-radius:18px;overflow:hidden;border:1px solid rgba(240,236,228,.1);transition:border-color .3s,transform .3s;}
.video-card:hover{border-color:rgba(204,255,0,.4);transform:translateY(-6px);}
.video-card video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.section-main-title{font-size:clamp(36px,4vw,58px);font-weight:900;line-height:1.15;display:flex;align-items:center;gap:14px;}
.section-main-title::before{content:"";display:block;width:5px;height:clamp(36px,4vw,58px);background:#CCFF00;border-radius:3px;flex-shrink:0;}
.section-sub-title{font-size:clamp(16px,2vw,24px);color:rgba(204,255,0,.8);font-weight:700;letter-spacing:.14em;margin-top:8px;}
.section-desc-item{font-size:clamp(15px,1.6vw,20px);color:rgba(240,236,228,.7);line-height:2.2;display:flex;align-items:flex-start;gap:10px;text-align:left;}
.section-desc-item::before{content:"4";color:rgba(204,255,0,.6);flex-shrink:0;font-weight:700;}
.section-header{display:flex;align-items:stretch;justify-content:center;gap:48px;margin-bottom:24px;background:rgba(204,255,0,.02);border-top:1px solid rgba(204,255,0,.06);border-bottom:1px solid rgba(204,255,0,.06);padding:32px 0;}
.section-left{flex-shrink:0;display:flex;flex-direction:column;justify-content:center;text-align:left;}
.section-right{display:flex;flex-direction:column;justify-content:center;}
.divider{display:flex;align-items:center;gap:16px;margin:72px 0;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(240,236,228,.08);}
.divider-diamond{width:8px;height:8px;background:#CCFF00;transform:rotate(45deg);flex-shrink:0;}
.brand-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:none;border-radius:50px;padding:16px 32px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;transition:transform .2s,opacity .2s;position:relative;overflow:hidden;flex:1;white-space:nowrap;min-width:180px;max-width:220px;}
.brand-btn:hover{transform:scale(1.04);opacity:.9;}
.kakao-btn{background:#FEE500;color:#3C1E1E;}
.tiktok-btn{background:#000;color:#fff;}
.youtube-btn{background:#FF0000;color:#fff;}
.lime-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#CCFF00;color:#0a0a0a;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .2s;position:relative;overflow:hidden;}
.lime-btn:hover{opacity:.85;}
.btn-row{position:relative;width:100%;height:56px;margin-top:12px;}
.btn-row a:first-child{position:absolute;left:25%;transform:translateX(-50%);}
.btn-row a:last-child{position:absolute;left:75%;transform:translateX(-50%);}
.upload-btn{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(204,255,0,.9);color:#0a0a0a;border:none;border-radius:16px;padding:5px 12px;font-size:10px;font-weight:900;cursor:pointer;white-space:nowrap;z-index:3;font-family:inherit;}
.progress-overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:4;}
.progress-bar-wrap{width:72%;height:5px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:#CCFF00;border-radius:3px;transition:width .25s;}
.tab-panel{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.tab-item{border:1px solid rgba(240,236,228,.08);border-radius:16px;overflow:hidden;position:relative;background:rgba(240,236,228,.02);}
.tab-item::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.4),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;z-index:1;}
.tab-btn{width:100%;padding:22px 24px;text-align:left;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .2s;}
.tab-btn:hover{background:rgba(204,255,0,.04);}
.tab-title{font-size:20px;font-weight:900;color:#f0ece4;line-height:1.3;word-break:keep-all;}
.tab-content-inner{padding:0 24px 24px;font-size:15px;}
.service-wrap{background:rgba(240,236,228,.03);border:1px solid rgba(240,236,228,.08);border-radius:20px;padding:40px;text-align:center;}
.service-notice{border-top:1px solid rgba(240,236,228,.08);padding-top:28px;display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:960px;margin-left:auto;margin-right:auto;}
.notice-item{font-size:15px;color:rgba(240,236,228,.45);line-height:1.9;display:flex;gap:8px;text-align:left;}
.prep-grid{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.service-icon-box{width:30px;height:30px;border-radius:6px;background:rgba(204,255,0,.1);border:1px solid rgba(204,255,0,.2);display:inline-flex;align-items:center;justify-content:center;margin-right:8px;vertical-align:middle;flex-shrink:0;}
.ripple-circle{position:absolute;border-radius:50%;background:rgba(0,0,0,.2);transform:scale(0);animation:rippleAnim .6s linear;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
.particle{position:fixed;width:3px;height:3px;background:#CCFF00;border-radius:50%;pointer-events:none;z-index:9990;}
@media(hover:hover){body{cursor:none;}#cursor-dot{width:8px;height:8px;background:#CCFF00;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}}
@media(hover:none){#cursor-dot{display:none;}}
@media(max-width:768px){
  .inner{padding:0 16px;}
  .shell{max-width:100%;}
  .hero-row{flex-direction:column !important;align-items:center !important;gap:20px !important;text-align:center !important;}
  .section-header{flex-direction:column;align-items:flex-start;gap:16px;padding:24px 16px;background:none;border:none;}
  .section-main-title{font-size:clamp(28px,8vw,42px);word-break:keep-all;}
  .grid4{grid-template-columns:repeat(2,1fr);gap:8px;}
  .btn-row{height:auto;display:flex;flex-direction:row;gap:8px;justify-content:center;margin-top:16px;padding:0 16px;}
  .btn-row a:first-child,.btn-row a:last-child{position:static;transform:none;flex:none;width:auto;}
  .brand-btn{padding:12px 16px !important;font-size:15px !important;min-width:unset !important;max-width:unset !important;}
  .service-wrap{padding:24px 16px;}
  .service-notice{grid-template-columns:1fr;gap:12px;}
  .tab-panel{grid-template-columns:1fr;}
  .divider{margin:40px 0;}
}
@media(max-width:480px){
  .grid4{grid-template-columns:repeat(2,1fr);gap:6px;}
  .brand-btn{font-size:14px !important;padding:14px 10px !important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const CLOUDINARY_CLOUD="ddjdyn0yj";
const CLOUDINARY_PRESET="lod_unsigned";
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx_SvdtsSxoav9EPFu9UlBMkfjbMeYubKJbd1oDs780TUs3Vx4MnrmqSKYgvSOg7d50Ug/exec";
const IS_ADMIN=new URLSearchParams(location.search).get("admin")==="true";

function loadSheetData(){
  return new Promise(resolve=>{
    const name="load_"+Date.now();
    const s=document.createElement("script");
    s.src=APPS_SCRIPT_URL+"?callback="+name+"&t="+Date.now();
    window[name]=(data)=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(data);};
    s.onerror=()=>{delete window[name];resolve({});};
    setTimeout(()=>{if(window[name]){delete window[name];resolve({});}},5000);
    document.body.appendChild(s);
  });
}

function uploadFile(file,type,onProgress){
  const max=type==="video"?500*1024*1024:20*1024*1024;
  if(file.size>max)return Promise.reject(new Error("\ud30c\uc77c\uc774 \ub108\ubb34 \ud07d\ub2c8\ub2e4."));
  return new Promise((resolve,reject)=>{
    const fd=new FormData();fd.append("file",file);fd.append("upload_preset",CLOUDINARY_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>{const r=JSON.parse(xhr.responseText);if(r.secure_url)resolve(r.secure_url);else reject(new Error("\uc5c5\ub85c\ub4dc \uc2e4\ud328"));};
    xhr.onerror=()=>reject(new Error("\uc5f0\uacb0 \uc624\ub958"));
    xhr.timeout=5*60*1000;
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${type}/upload`);
    xhr.send(fd);
  });
}

function saveToSheet(key,value){
  return new Promise(resolve=>{
    const name="save_"+Date.now();
    const s=document.createElement("script");
    const p=new URLSearchParams({callback:name,action:"update",key,value,t:Date.now()});
    s.src=APPS_SCRIPT_URL+"?"+p.toString();
    window[name]=(res)=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(res);};
    s.onerror=()=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(null);};
    setTimeout(()=>{if(window[name]){delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(null);}},8000);
    document.body.appendChild(s);
  });
}

function LDLogo({size=160}){
  return(<svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{flexShrink:0}}>
    <circle cx="50" cy="50" r="46" stroke="rgba(204,255,0,.25)" strokeWidth="8" fill="none"/>
    <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="4" fill="none"/>
    <text x="50" y="66" textAnchor="middle" fontFamily="Georgia,serif" fontWeight="900" fontSize="52" fill="#f0ece4">LD</text>
  </svg>);
}

function TabItem({title,content}){
  const [open,setOpen]=useState(false);
  return(<div className="tab-item">
    <button className={`tab-btn${open?" tab-btn-open":""}`} onClick={()=>setOpen(!open)}>
      <span className="tab-title">{title}</span>
      <span style={{fontSize:12,color:"rgba(204,255,0,.7)",flexShrink:0,transform:open?"rotate(90deg)":"rotate(0deg)",transition:"transform .3s",display:"inline-block"}}>&#9654;</span>
    </button>
    <div style={{maxHeight:open?"800px":"0",overflow:"hidden",transition:"max-height .4s ease"}}>
      <div className="tab-content-inner">{content}</div>
    </div>
  </div>);
}

function PhotoCard({idx,url,onSave}){
  const fileRef=useRef(null);
  const [src,setSrc]=useState(url||"");
  const [prog,setProg]=useState(0);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{setSrc(url||"");},[url]);
  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setLoading(true);setProg(0);
    try{
      const newUrl=await uploadFile(file,"image",setProg);
      setSrc(newUrl);
      await saveToSheet("AI\ubaa8\ub378\uc0ac\uc9c4"+(idx+1),newUrl);
      if(onSave)onSave(idx,newUrl);
    }catch(err){alert(err.message);}
    finally{setLoading(false);e.target.value="";}
  };
  return(<div className="photo-card">
    {src?<img src={src} alt={"AI \ubaa8\ub378 \uc0ac\uc9c4 "+(idx+1)}/>
      :<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
        <div style={{fontSize:32,fontWeight:900,color:"rgba(204,255,0,.12)",letterSpacing:"3px"}}>{String(idx+1).padStart(2,"0")}</div>
        <span style={{fontSize:9,color:"rgba(240,236,228,.15)",letterSpacing:".3em"}}>PHOTO</span>
      </div>}
    {loading&&<div className="progress-overlay"><div style={{fontSize:11,color:"#CCFF00",fontWeight:700}}>{"\uc5c5\ub85c\ub4dc "+prog+"%"}</div><div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:prog+"%"}}/></div></div>}
    {IS_ADMIN&&!loading&&<button className="upload-btn" onClick={()=>fileRef.current?.click()}>{src?"\uad50\uccb4":"\uc5c5\ub85c\ub4dc"}</button>}
    {/* 워터마크 */}
    {src&&<div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:2,overflow:"hidden",borderRadius:18}}>
      <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style={{position:"absolute",inset:0}}>
        <defs>
          <pattern id={"wm"+idx} x="0" y="0" width="160" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
            <text x="10" y="40" fontFamily="Georgia,serif" fontSize="13" fill="rgba(180,180,180,0.25)" fontWeight="400" letterSpacing="2">Layer On Drape</text>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={"url(#wm"+idx+")"}/>
      </svg>
    </div>}
    <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
  </div>);
}

function VideoCard({idx,url,onSave}){
  const fileRef=useRef(null);
  const vidRef=useRef(null);
  const [src,setSrc]=useState(url||"");
  const [prog,setProg]=useState(0);
  const [loading,setLoading]=useState(false);
  const [muted,setMuted]=useState(true);
  useEffect(()=>{setSrc(url||"");},[url]);
  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setLoading(true);setProg(0);
    try{
      const newUrl=await uploadFile(file,"video",setProg);
      setSrc(newUrl);
      await saveToSheet("AI\ubaa8\ub378\uc601\uc0c1"+(idx+1),newUrl);
      if(onSave)onSave(idx,newUrl);
    }catch(err){alert(err.message);}
    finally{setLoading(false);e.target.value="";}
  };
  return(<div className="video-card">
    {src?<><video ref={vidRef} src={src} autoPlay muted loop playsInline/>
      <button onClick={()=>{if(!vidRef.current)return;vidRef.current.muted=!muted;setMuted(!muted);}}
        style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.7)",border:"none",borderRadius:14,padding:"5px 10px",cursor:"pointer",color:"#fff",fontSize:10,fontWeight:700,fontFamily:"inherit",zIndex:3}}>
        {muted?"\ubb34\uc74c":"\uc18c\ub9ac"}</button></>
      :<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
        <div style={{fontSize:32,fontWeight:900,color:"rgba(204,255,0,.12)",letterSpacing:"3px"}}>{String(idx+1).padStart(2,"0")}</div>
        <span style={{fontSize:9,color:"rgba(240,236,228,.15)",letterSpacing:".3em"}}>VIDEO</span>
      </div>}
    {loading&&<div className="progress-overlay"><div style={{fontSize:11,color:"#CCFF00",fontWeight:700}}>{"\uc5c5\ub85c\ub4dc "+prog+"%"}</div><div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:prog+"%"}}/></div></div>}
    {IS_ADMIN&&!loading&&<button className="upload-btn" onClick={()=>fileRef.current?.click()}>{src?"\uad50\uccb4":"\uc5c5\ub85c\ub4dc"}</button>}
    <input ref={fileRef} type="file" accept="video/*" style={{display:"none"}} onChange={handleFile}/>
  </div>);
}

function App(){
  const [photos,setPhotos]=useState(Array(8).fill(""));
  const [videos,setVideos]=useState(Array(4).fill(""));
  const [prices,setPrices]=useState({p1:"4,000\uc6d0",p2:"3,000\uc6d0",v30:"50,000\uc6d0",v60:"100,000\uc6d0"});
  const [links,setLinks]=useState({kakao:"https://open.kakao.com/",tiktok:"https://www.tiktok.com/@glggid",youtube:"https://www.youtube.com/"});

  useEffect(()=>{
    loadSheetData().then(data=>{
      if(data.photo_price1)setPrices(p=>({...p,p1:Number(data.photo_price1).toLocaleString()+"\uc6d0"}));
      if(data.photo_price2)setPrices(p=>({...p,p2:Number(data.photo_price2).toLocaleString()+"\uc6d0"}));
      if(data.video_30s)setPrices(p=>({...p,v30:Number(data.video_30s).toLocaleString()+"\uc6d0"}));
      if(data.video_60s)setPrices(p=>({...p,v60:Number(data.video_60s).toLocaleString()+"\uc6d0"}));
      if(data.kakao_link)setLinks(l=>({...l,kakao:data.kakao_link}));
      if(data.tiktok_link)setLinks(l=>({...l,tiktok:data.tiktok_link}));
      if(data.youtube_link)setLinks(l=>({...l,youtube:data.youtube_link}));
      // ✅ 사진/영상 URL 시트에서 불러오기
      setPhotos(Array(8).fill("").map((_,i)=>data["AI\ubaa8\ub378\uc0ac\uc9c4"+(i+1)]||""));
      setVideos(Array(4).fill("").map((_,i)=>data["AI\ubaa8\ub378\uc601\uc0c1"+(i+1)]||""));
    });
  },[]);

  return(<div className="shell">

    {/* 히어로 */}
    <div className="inner hero-bg" style={{paddingTop:60,paddingBottom:72}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:"clamp(16px,1.8vw,22px)",letterSpacing:".5em",color:"rgba(204,255,0,.8)",fontWeight:700,textTransform:"uppercase"}}>AI FASHION MODEL</div>
      </div>
      <div className="hero-row" style={{display:"flex",justifyContent:"center",alignItems:"center",gap:48}}>
        <LDLogo size={180}/>
        <div style={{textAlign:"left"}}>
          <h1 style={{fontSize:"clamp(40px,5vw,76px)",fontWeight:900,lineHeight:1.1,marginBottom:24,color:"#f0ece4",whiteSpace:"pre-line"}}>{"\uc778\ud50c\ub8e8\uc5b8\uc11c \ud328\uc158\nAI \ubaa8\ub378 \uc81c\uc791"}</h1>
          <p style={{fontSize:"clamp(18px,2vw,26px)",lineHeight:1.9}}>
            <span style={{color:"#CCFF00",fontWeight:900,fontSize:"clamp(20px,2.2vw,28px)"}}>{"\uc758\uc0c1 \uc0ac\uc9c4\ub9cc \uc788\uc73c\uba74"}</span>
            <span style={{color:"rgba(240,236,228,.65)"}}>{" \ubaa8\ub378\uc0f7\uacfc \ubaa8\ub378\uc601\uc0c1\uc744 \ub9cc\ub4e4\uc5b4 \ub4dc\ub9bd\ub2c8\ub2e4."}</span>
          </p>
        </div>
      </div>
    </div>

    {/* 사진 섹션 */}
    <div className="inner">
      <div className="section-header">
        <div className="section-left">
          <div className="section-num">01</div>
          <div className="section-main-title">{"AI \ubaa8\ub378 \uc0ac\uc9c4"}</div>
          <div className="section-sub-title">PHOTO PORTFOLIO</div>

const dot=document.createElement("div");dot.id="cursor-dot";document.body.appendChild(dot);
document.addEventListener("mousemove",e=>{dot.style.left=e.clientX+"px";dot.style.top=e.clientY+"px";});
for(let i=0;i<20;i++){
  const p=document.createElement("div");p.className="particle";
  const x=Math.random()*window.innerWidth;const dur=4+Math.random()*6;const delay=Math.random()*6;
  p.style.cssText=`left:${x}px;top:${window.innerHeight}px;opacity:0;transition:none;`;
  document.body.appendChild(p);
  function animParticle(el){
    const drift=(Math.random()-.5)*100;
    el.style.transition=`transform ${dur}s linear, opacity ${dur}s ease`;
    el.style.transform=`translate(${drift}px,-${window.innerHeight+20}px)`;
    el.style.opacity=(Math.random()*.4+.1).toString();
    setTimeout(()=>{el.style.transition="none";el.style.transform="translate(0,0)";el.style.opacity="0";el.style.left=Math.random()*window.innerWidth+"px";setTimeout(()=>animParticle(el),100);},dur*1000);
  }
  setTimeout(()=>animParticle(p),delay*1000);
}
const observer=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity="1";e.target.style.transform="translateY(0)";}});},{threshold:0.15});
document.querySelectorAll(".inner,.service-wrap,.section-header").forEach((el,i)=>{
  el.style.opacity="0";el.style.transform="translateY(28px)";
  el.style.transition=`opacity .7s ease ${i*0.1}s, transform .7s ease ${i*0.1}s`;
  observer.observe(el);
});
