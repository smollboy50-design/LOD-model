<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOD — 인플루언서 패션 AI 모델 제작</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:#0a0a0a;
  color:#f0ece4;
  font-family:'Noto Sans KR',sans-serif;
  overflow-x:hidden;
  min-height:100%;
  width:100%;
}
/* 전체 화면 중앙 정렬 */
#root{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  background:#0a0a0a;
}
/* 콘텐츠 박스 — 양옆 선 포함 */
.shell{
  width:100%;
  max-width:1190px;
  min-height:100vh;
  background:#0a0a0a;

  box-sizing:border-box;
  text-align:center;
}
/* 내부 패딩 */
.inner{
  padding:0 50px;
  width:100%;
  box-sizing:border-box;
}
.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
/* radial glow 히어로 배경 */
.hero-bg{position:relative;}
.hero-bg::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(204,255,0,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

/* 2번 섹션 헤더 배경 */
.section-header{display:flex;align-items:stretch;justify-content:center;gap:48px;margin-bottom:24px;background:rgba(204,255,0,.02);border-top:1px solid rgba(204,255,0,.06);border-bottom:1px solid rgba(204,255,0,.06);padding:32px 0;}

/* 3번 서비스 아이콘 박스 */
.service-icon-box{width:30px;height:30px;border-radius:6px;background:rgba(204,255,0,.1);border:1px solid rgba(204,255,0,.2);display:inline-flex;align-items:center;justify-content:center;margin-right:8px;vertical-align:middle;flex-shrink:0;}

/* 4번 모바일 반응형 */
@media(max-width:768px){
  .inner{padding:0 20px;}
  .section-header{flex-direction:column;align-items:flex-start;gap:20px;padding:24px 20px;}
  .grid4{grid-template-columns:repeat(2,1fr);}
  .service-grid{grid-template-columns:1fr;}
  .service-notice{grid-template-columns:1fr;}
  .btn-row{height:auto;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .btn-row a:first-child,.btn-row a:last-child{position:static;transform:none;width:80%;}
  .shell{max-width:100%;}
  h1{font-size:clamp(32px,8vw,56px) !important;}
}
@media(max-width:480px){
  .grid4{grid-template-columns:repeat(2,1fr);}
  .hero-inner{flex-direction:column !important;text-align:center !important;}
}

.photo-card::after,.video-card::after{content:"";position:absolute;inset:0;border-radius:14px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.5),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* 섹션 번호 */
.section-num{font-size:11px;color:rgba(204,255,0,.45);font-weight:700;letter-spacing:4px;margin-bottom:6px;}

/* ripple */
.ripple-circle{position:absolute;border-radius:50%;background:rgba(0,0,0,.2);transform:scale(0);animation:rippleAnim .6s linear;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
.lime-btn{position:relative;overflow:hidden;}



/* 5번 파티클 */
.particle{position:fixed;width:3px;height:3px;background:#CCFF00;border-radius:50%;pointer-events:none;z-index:9990;}

/* 커서 효과 */
body{cursor:none;}
#cursor-dot{width:8px;height:8px;background:#CCFF00;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s;}
#cursor-ring{width:32px;height:32px;border:1.5px solid rgba(204,255,0,.5);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .12s ease,top .12s ease;}

/* 2번 버튼 hover 스케일+글로우 */
.lime-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#CCFF00;color:#0a0a0a;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:900;cursor:none;font-family:inherit;text-decoration:none;transition:transform .2s,box-shadow .2s;}
.lime-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(204,255,0,.4);}

/* 3번 구분선 다이아몬드 */
.divider{display:flex;align-items:center;gap:16px;margin:72px 0;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(240,236,228,.08);}
.divider::after{content:"";}
.divider-diamond{width:8px;height:8px;background:#CCFF00;transform:rotate(45deg);flex-shrink:0;}

/* 6번 히어로 그리드 배경 */
.hero-bg{background-image:linear-gradient(rgba(204,255,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(204,255,0,.03) 1px,transparent 1px);background-size:40px 40px;}

.photo-card{
  position:relative;
  padding-top:177.78%;
  background:#111;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(240,236,228,.1);
  cursor:pointer;
  transition:border-color .3s, transform .3s;
}
.photo-card:hover{border-color:rgba(204,255,0,.4);transform:translateY(-6px);}
.photo-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.video-card{position:relative;padding-top:177.78%;background:#111;border-radius:14px;overflow:hidden;border:1px solid rgba(240,236,228,.1);transition:border-color .3s,transform .3s;}
.video-card:hover{border-color:rgba(204,255,0,.4);transform:translateY(-6px);}
.video-card video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}

/* 3번 - 섹션 타이틀 라임 라인 장식 */
.section-main-title{font-size:clamp(36px,4vw,58px);font-weight:900;line-height:1.15;display:flex;align-items:center;gap:14px;}
.section-main-title::before{content:"";display:block;width:5px;height:clamp(36px,4vw,58px);background:#CCFF00;border-radius:3px;flex-shrink:0;}

/* 5번 - fade-in 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.fade-in{opacity:0;animation:fadeUp .7s ease forwards;}
.fade-in.visible{opacity:1;}

/* 아코디언 */
.accordion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.accordion{border:1px solid rgba(240,236,228,.08);border-radius:16px;overflow:hidden;position:relative;}
.accordion::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.5),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;z-index:1;}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;cursor:pointer;background:rgba(240,236,228,.02);transition:background .2s;}
.accordion-header:hover{background:rgba(204,255,0,.04);}
.accordion-title{font-size:16px;font-weight:700;color:#f0ece4;}
.accordion-arrow{font-size:18px;color:#CCFF00;transition:transform .3s;flex-shrink:0;}
.accordion-arrow.open{transform:rotate(180deg);}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.accordion-body.open{max-height:800px;}
.accordion-body-inner{padding:0 28px 24px;}
.accordion-body p{font-size:14px;color:rgba(240,236,228,.55);line-height:2;margin-bottom:8px;}
.accordion-body ul{list-style:none;padding:0;}
.accordion-body ul li{font-size:14px;color:rgba(240,236,228,.55);line-height:2;}
.accordion-body ul li::before{content:"·";color:#CCFF00;margin-right:8px;}
.accordion-body table{width:100%;font-size:13px;border-collapse:collapse;margin-top:8px;}
.accordion-body td{padding:10px 12px;border-bottom:1px solid rgba(240,236,228,.06);color:rgba(240,236,228,.55);}
.accordion-body td:first-child{color:rgba(240,236,228,.3);width:40%;}



.lime-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#CCFF00;color:#0a0a0a;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .2s;}
.lime-btn:hover{opacity:.85;}
.btn-row{position:relative;width:100%;height:56px;margin-top:12px;}
.btn-row a:first-child{position:absolute;left:25%;transform:translateX(-50%);}
.btn-row a:last-child{position:absolute;left:75%;transform:translateX(-50%);}

.upload-btn{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(204,255,0,.9);color:#0a0a0a;border:none;border-radius:16px;padding:5px 12px;font-size:10px;font-weight:900;cursor:pointer;white-space:nowrap;z-index:3;font-family:inherit;}
.progress-overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:4;}
.progress-bar-wrap{width:72%;height:5px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:#CCFF00;border-radius:3px;transition:width .25s;}
.divider{height:1px;background:rgba(240,236,228,.08);margin:72px 0;}
.section-header{display:flex;align-items:stretch;justify-content:center;gap:48px;margin-bottom:24px;}
.section-left{flex-shrink:0;display:flex;flex-direction:column;justify-content:center;text-align:left;}
.section-main-title{font-size:clamp(36px,4vw,58px);font-weight:900;line-height:1.15;}
.section-sub-title{font-size:clamp(16px,2vw,24px);color:rgba(204,255,0,.8);font-weight:700;letter-spacing:.14em;margin-top:8px;}
.section-right{display:flex;flex-direction:column;justify-content:center;}
.section-desc-item{font-size:clamp(15px,1.6vw,20px);color:rgba(240,236,228,.7);line-height:2.2;display:flex;align-items:flex-start;gap:10px;text-align:left;}
.section-desc-item::before{content:"—";color:rgba(204,255,0,.6);flex-shrink:0;font-weight:700;}
.service-wrap{background:rgba(240,236,228,.03);border:1px solid rgba(240,236,228,.08);border-radius:20px;padding:40px;text-align:center;}
.service-intro{font-size:18px;color:rgba(240,236,228,.7);line-height:2.1;margin-bottom:40px;border-left:3px solid #CCFF00;padding-left:20px;text-align:left;max-width:820px;margin-left:auto;margin-right:auto;}
.service-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-bottom:36px;max-width:960px;margin-left:auto;margin-right:auto;}
.service-block-title{font-size:18px;font-weight:900;color:#CCFF00;margin-bottom:14px;text-align:left;}
.service-block-item{font-size:15px;color:rgba(240,236,228,.65);line-height:2.1;display:flex;align-items:flex-start;gap:8px;text-align:left;}
.service-block-item::before{content:"—";color:rgba(204,255,0,.4);flex-shrink:0;}
.service-notice{border-top:1px solid rgba(240,236,228,.08);padding-top:28px;display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:960px;margin-left:auto;margin-right:auto;}
.notice-item{font-size:15px;color:rgba(240,236,228,.45);line-height:1.9;display:flex;gap:8px;text-align:left;}
.notice-item::before{content:"·";color:rgba(204,255,0,.4);flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const CLOUDINARY_CLOUD="ddjdyn0yj";
const CLOUDINARY_PRESET="lod_unsigned";
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbwtVcrYr-6Gth2v2OxM5XRYuIRDzHoycjXLfoMZ23AyRmcwtuFYK5YUvPzdXXUifa4G/exec";
const IS_ADMIN=new URLSearchParams(location.search).get("admin")==="true";
const KAKAO_LINK="https://open.kakao.com/";
const TIKTOK_LINK="https://www.tiktok.com/@glggid";
const YOUTUBE_LINK="https://www.youtube.com/";

function uploadFile(file,type,onProgress){
  const max=type==="video"?500*1024*1024:20*1024*1024;
  if(file.size>max)return Promise.reject(new Error("파일이 너무 큽니다."));
  return new Promise((resolve,reject)=>{
    const fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset",CLOUDINARY_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>{const r=JSON.parse(xhr.responseText);if(r.secure_url)resolve(r.secure_url);else reject(new Error("업로드 실패"));};
    xhr.onerror=()=>reject(new Error("연결 오류"));
    xhr.timeout=5*60*1000;
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${type}/upload`);
    xhr.send(fd);
  });
}
function saveToSheet(key,value){
  return new Promise(resolve=>{
    const name="save_"+Date.now();
    const s=document.createElement("script");
    const p=new URLSearchParams({callback:name,action:"update",key,value,t:Date.now()});
    s.src=APPS_SCRIPT_URL+"?"+p.toString();
    window[name]=(res)=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(res);};
    s.onerror=()=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(null);};
    setTimeout(()=>{if(window[name]){delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(null);}},8000);
    document.body.appendChild(s);
  });
}

function LDLogo({size=160}){
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{flexShrink:0}}>
      <circle cx="50" cy="50" r="46" stroke="rgba(204,255,0,.25)" strokeWidth="8" fill="none"/>
      <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="4" fill="none"/>
      <text x="50" y="66" textAnchor="middle" fontFamily="Georgia,serif" fontWeight="900" fontSize="52" fill="#f0ece4">LD</text>
    </svg>
  );
}

function PhotoCard({idx,url,onSave}){
  const fileRef=useRef(null);
  const [src,setSrc]=useState(url||"");
  const [prog,setProg]=useState(0);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{if(url)setSrc(url);},[url]);
  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setLoading(true);setProg(0);
    try{const newUrl=await uploadFile(file,"image",setProg);setSrc(newUrl);await saveToSheet(`AI모델사진${idx+1}`,newUrl);if(onSave)onSave(idx,newUrl);}
    catch(err){alert(err.message);}finally{setLoading(false);e.target.value="";}
  };
  return(
    <div className="photo-card">
      {src?<img src={src} alt={`AI 모델 사진 ${idx+1}`}/>
        :<div className="card-empty">
          <div style={{fontSize:32,fontWeight:900,color:"rgba(204,255,0,.12)",letterSpacing:"3px"}}>{String(idx+1).padStart(2,"0")}</div>
          <span style={{fontSize:9,color:"rgba(240,236,228,.15)",letterSpacing:".3em"}}>PHOTO</span>
        </div>}
      {loading&&<div className="progress-overlay"><div style={{fontSize:11,color:"#CCFF00",fontWeight:700}}>업로드 {prog}%</div><div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:prog+"%"}}/></div></div>}
      {IS_ADMIN&&!loading&&<button className="upload-btn" onClick={()=>fileRef.current?.click()}>{src?"교체":"업로드"}</button>}
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
    </div>
  );
}

function VideoCard({idx,url,onSave}){
  const fileRef=useRef(null);
  const vidRef=useRef(null);
  const [src,setSrc]=useState(url||"");
  const [prog,setProg]=useState(0);
  const [loading,setLoading]=useState(false);
  const [muted,setMuted]=useState(true);
  useEffect(()=>{if(url)setSrc(url);},[url]);
  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setLoading(true);setProg(0);
    try{const newUrl=await uploadFile(file,"video",setProg);setSrc(newUrl);await saveToSheet(`AI모델영상${idx+1}`,newUrl);if(onSave)onSave(idx,newUrl);}
    catch(err){alert(err.message);}finally{setLoading(false);e.target.value="";}
  };
  const toggleMute=()=>{if(!vidRef.current)return;vidRef.current.muted=!muted;setMuted(!muted);};
  return(
    <div className="video-card">
      {src?<><video ref={vidRef} src={src} autoPlay muted loop playsInline/>
        <button onClick={toggleMute} style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.7)",border:"none",borderRadius:14,padding:"5px 10px",cursor:"pointer",color:"#fff",fontSize:10,fontWeight:700,fontFamily:"inherit",zIndex:3}}>
          {muted?"🔇 소리":"🔊 음소거"}</button></>
        :<div className="card-empty">
          <div style={{fontSize:32,fontWeight:900,color:"rgba(204,255,0,.12)",letterSpacing:"3px"}}>{String(idx+1).padStart(2,"0")}</div>
          <span style={{fontSize:9,color:"rgba(240,236,228,.15)",letterSpacing:".3em"}}>VIDEO</span>
        </div>}
      {loading&&<div className="progress-overlay"><div style={{fontSize:11,color:"#CCFF00",fontWeight:700}}>업로드 {prog}%</div><div className="progress-bar-wrap"><div className="progress-bar-fill" style={{width:prog+"%"}}/></div></div>}
      {IS_ADMIN&&!loading&&<button className="upload-btn" onClick={()=>fileRef.current?.click()}>{src?"교체":"업로드"}</button>}
      <input ref={fileRef} type="file" accept="video/*" style={{display:"none"}} onChange={handleFile}/>
    </div>
  );
}

function App(){
  const [photos,setPhotos]=useState(Array(8).fill(""));
  const [videos,setVideos]=useState(Array(4).fill(""));
  return(
    <div className="shell">

      {/* 히어로 */}
      <div className="inner hero-bg" style={{paddingTop:60,paddingBottom:72}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:"clamp(12px,1.2vw,15px)",letterSpacing:".5em",color:"rgba(204,255,0,.8)",fontWeight:700,textTransform:"uppercase"}}>
            AI FASHION MODEL
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:48}}>
          <LDLogo size={180}/>
          <div style={{textAlign:"left"}}>
            <h1 style={{fontSize:"clamp(40px,5vw,76px)",fontWeight:900,lineHeight:1.1,marginBottom:24,color:"#f0ece4"}}>
              인플루언서 패션<br/>AI 모델 제작
            </h1>
            <p style={{fontSize:"clamp(16px,1.8vw,22px)",lineHeight:1.9}}>
              <span style={{color:"#CCFF00",fontWeight:700}}>의상 사진만 있으면</span>
              <span style={{color:"rgba(240,236,228,.65)"}}> 모델샷과 모델영상을 만들어 드립니다.</span>
            </p>
          </div>
        </div>
      </div>

      {/* 사진 섹션 */}
      <div className="inner">
        <div className="section-header">
          <div className="section-left">
            <div className="section-num">01</div>
            <div className="section-main-title">AI 모델 사진</div>
            <div className="section-sub-title">PHOTO PORTFOLIO</div>
          </div>
          <div className="section-right">
            {["예쁜 모델 사진이 필요한데 촬영이 부담스러운 분","저작권 걱정 없는 자연스러운 모델을 원하시는 분","기존 AI 모델보다 실제 인플루언서 같은 이미지를 원하시는 분","신상마켓·쇼핑몰 상품 사진이 필요하신 분"].map((t,i)=><div key={i} className="section-desc-item">{t}</div>)}
          </div>
        </div>
        <div className="grid4" style={{marginBottom:20}}>
          {photos.map((url,i)=><PhotoCard key={i} idx={i} url={url} onSave={(idx,newUrl)=>setPhotos(p=>p.map((u,j)=>j===idx?newUrl:u))}/>)}
        </div>
        <div className="btn-row">

const dot=document.createElement("div");dot.id="cursor-dot";document.body.appendChild(dot);
const ring=document.createElement("div");ring.id="cursor-ring";document.body.appendChild(ring);
document.addEventListener("mousemove",e=>{
  dot.style.left=e.clientX+"px";dot.style.top=e.clientY+"px";
  ring.style.left=e.clientX+"px";ring.style.top=e.clientY+"px";
});



// 2번 ripple 효과
document.addEventListener("click",function(e){
  const btn=e.target.closest(".lime-btn");
  if(!btn)return;
  const r=document.createElement("span");
  r.className="ripple-circle";
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+"px";
  r.style.left=(e.clientX-rect.left-size/2)+"px";
  r.style.top=(e.clientY-rect.top-size/2)+"px";
  btn.appendChild(r);
  setTimeout(()=>r.remove(),600);
});

// 5번 파티클
for(let i=0;i<20;i++){
  const p=document.createElement("div");
  p.className="particle";
  const x=Math.random()*window.innerWidth;
  const dur=4+Math.random()*6;
  const delay=Math.random()*6;
  p.style.cssText=`left:${x}px;top:${window.innerHeight}px;opacity:0;transition:none;`;
  document.body.appendChild(p);
  function animParticle(el,startX){
    const drift=(Math.random()-.5)*100;
    el.style.transition=`transform ${dur}s linear, opacity ${dur}s ease`;
    el.style.transform=`translate(${drift}px,-${window.innerHeight+20}px)`;
    el.style.opacity=(Math.random()*.4+.1).toString();
    setTimeout(()=>{
      el.style.transition="none";
      el.style.transform="translate(0,0)";
      el.style.opacity="0";
      el.style.left=Math.random()*window.innerWidth+"px";
      setTimeout(()=>animParticle(el),100);
    },dur*1000);
  }
  setTimeout(()=>animParticle(p,x),delay*1000);
}

const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity="1";e.target.style.transform="translateY(0)";}});
},{threshold:0.15});
document.querySelectorAll(".inner,.service-wrap,.section-header").forEach((el,i)=>{
  el.style.opacity="0";
  el.style.transform="translateY(28px)";
  el.style.transition=`opacity .7s ease ${i*0.1}s, transform .7s ease ${i*0.1}s`;
  observer.observe(el);
});
</script>
