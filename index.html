  <style>

      color: #f0ece4;

    .grid4 {

      gap: 10px;

    .photo-card {

    .card-empty {

    .video-card {

    .lime-btn {

<body>
<div id="root" style="width:100vw;display:flex;justify-content:center;background:#0a0a0a;"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const CLOUDINARY_CLOUD = "ddjdyn0yj";
const CLOUDINARY_PRESET = "lod_unsigned";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtVcrYr-6Gth2v2OxM5XRYuIRDzHoycjXLfoMZ23AyRmcwtuFYK5YUvPzdXXUifa4G/exec";
const IS_ADMIN = new URLSearchParams(location.search).get("admin") === "true";
const KAKAO_LINK = "https://open.kakao.com/";
const TIKTOK_LINK = "https://www.tiktok.com/@glggid";
const YOUTUBE_LINK = "https://www.youtube.com/";

function uploadFile(file, type, onProgress) {
  const max = type === "video" ? 500*1024*1024 : 20*1024*1024;
  if (file.size > max) return Promise.reject(new Error("파일이 너무 큽니다."));
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append("file", file);
    fd.append("upload_preset", CLOUDINARY_PRESET);
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => { if (e.lengthComputable && onProgress) onProgress(Math.round(e.loaded/e.total*100)); };
    xhr.onload = () => { const r = JSON.parse(xhr.responseText); if (r.secure_url) resolve(r.secure_url); else reject(new Error("업로드 실패")); };
    xhr.onerror = () => reject(new Error("연결 오류"));
    xhr.timeout = 5*60*1000;
    xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${type}/upload`);
    xhr.send(fd);
  });
}

function saveToSheet(key, value) {
  return new Promise(resolve => {
    const name = "save_" + Date.now();
    const s = document.createElement("script");
    const p = new URLSearchParams({ callback: name, action: "update", key, value, t: Date.now() });
    s.src = APPS_SCRIPT_URL + "?" + p.toString();
    window[name] = res => { delete window[name]; if (document.body.contains(s)) document.body.removeChild(s); resolve(res); };
    s.onerror = () => { delete window[name]; if (document.body.contains(s)) document.body.removeChild(s); resolve(null); };
    setTimeout(() => { if (window[name]) { delete window[name]; if (document.body.contains(s)) document.body.removeChild(s); resolve(null); } }, 8000);
    document.body.appendChild(s);
  });
}

function LDLogo({ size = 160 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" style={{ flexShrink: 0 }}>
      <circle cx="50" cy="50" r="46" stroke="#f0ece4" strokeWidth="4" fill="none"/>
      <text x="50" y="66" textAnchor="middle" fontFamily="Georgia,serif" fontWeight="900" fontSize="52" fill="#f0ece4">LD</text>
    </svg>
  );
}

function PhotoCard({ idx, url, onSave }) {
  const fileRef = useRef(null);
  const [src, setSrc] = useState(url || "");
  const [prog, setProg] = useState(0);
  const [loading, setLoading] = useState(false);
  useEffect(() => { if (url) setSrc(url); }, [url]);
  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setProg(0);
    try {
      const newUrl = await uploadFile(file, "image", setProg);
      setSrc(newUrl);
      await saveToSheet(`AI모델사진${idx+1}`, newUrl);
      if (onSave) onSave(idx, newUrl);
    } catch (err) { alert(err.message); }
    finally { setLoading(false); e.target.value = ""; }
  };
  return (
    <div className="photo-card">
      {src
        ? <img src={src} alt={`AI 모델 사진 ${idx+1}`}/>
        : <div className="card-empty">
            <div style={{ fontSize: 22, color: "rgba(204,255,0,.2)" }}>+</div>
            <span style={{ fontSize: 9, color: "rgba(240,236,228,.15)", letterSpacing: ".2em" }}>PHOTO {idx+1}</span>
          </div>
      }
      {loading && (
        <div className="progress-overlay">
          <div style={{ fontSize: 11, color: "#CCFF00", fontWeight: 700 }}>업로드 {prog}%</div>
          <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{ width: prog+"%" }}/></div>
        </div>
      )}
      {IS_ADMIN && !loading && (
        <button className="upload-btn" onClick={() => fileRef.current?.click()}>{src ? "교체" : "업로드"}</button>
      )}
      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleFile}/>
    </div>
  );
}

function VideoCard({ idx, url, onSave }) {
  const fileRef = useRef(null);
  const vidRef = useRef(null);
  const [src, setSrc] = useState(url || "");
  const [prog, setProg] = useState(0);
  const [loading, setLoading] = useState(false);
  const [muted, setMuted] = useState(true);
  useEffect(() => { if (url) setSrc(url); }, [url]);
  const handleFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    setLoading(true); setProg(0);
    try {
      const newUrl = await uploadFile(file, "video", setProg);
      setSrc(newUrl);
      await saveToSheet(`AI모델영상${idx+1}`, newUrl);
      if (onSave) onSave(idx, newUrl);
    } catch (err) { alert(err.message); }
    finally { setLoading(false); e.target.value = ""; }
  };
  const toggleMute = () => { if (!vidRef.current) return; vidRef.current.muted = !muted; setMuted(!muted); };
  return (
    <div className="video-card">
      {src
        ? <>
            <video ref={vidRef} src={src} autoPlay muted loop playsInline/>
            <button onClick={toggleMute} style={{ position:"absolute", bottom:8, right:8, background:"rgba(0,0,0,.7)", border:"none", borderRadius:14, padding:"5px 10px", cursor:"pointer", color:"#fff", fontSize:10, fontWeight:700, fontFamily:"inherit", zIndex:3 }}>
              {muted ? "🔇 소리" : "🔊 음소거"}
            </button>
          </>
        : <div className="card-empty">
            <div style={{ fontSize: 22, color: "rgba(204,255,0,.2)" }}>▶</div>
            <span style={{ fontSize: 9, color: "rgba(240,236,228,.15)", letterSpacing: ".2em" }}>VIDEO {idx+1}</span>
          </div>
      }
      {loading && (
        <div className="progress-overlay">
          <div style={{ fontSize: 11, color: "#CCFF00", fontWeight: 700 }}>업로드 {prog}%</div>
          <div className="progress-bar-wrap"><div className="progress-bar-fill" style={{ width: prog+"%" }}/></div>
        </div>
      )}
      {IS_ADMIN && !loading && (
        <button className="upload-btn" onClick={() => fileRef.current?.click()}>{src ? "교체" : "업로드"}</button>
      )}
      <input ref={fileRef} type="file" accept="video/*" style={{ display: "none" }} onChange={handleFile}/>
    </div>
  );
}

  return (
    <div style={{position:"fixed",top:0,left:0,width:"100vw",height:"100vh",overflowY:"auto",background:"#0a0a0a"}}><div style={{maxWidth:1190,margin:"0 auto",padding:0}}>

              AI FASHION MODEL
            </div>
            <h1 style={{ fontSize: "clamp(40px,5.5vw,80px)", fontWeight: 900, lineHeight: 1.1, marginBottom: 24, color: "#f0ece4" }}>

            </h1>
            <p style={{ fontSize: "clamp(16px,1.8vw,22px)", lineHeight: 1.9 }}>
              <span style={{ color: "#CCFF00", fontWeight: 700 }}>의상 사진만 있으면</span>
              <span style={{ color: "rgba(240,236,228,.65)" }}> 모델샷과 모델영상을 만들어 드립니다.</span>
            </p>
          </div>
        </div>
      </div>

      {/* 사진 섹션 */}
      <div className="wrap">

          </div>
          <div className="section-right">
            {[
