<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOD — 인플루언서 패션 AI 모델 제작</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:#0a0a0a;
  color:#f0ece4;
  font-family:'Noto Sans KR',sans-serif;
  overflow-x:hidden;
  min-height:100%;
  width:100%;
}
/* 전체 화면 중앙 정렬 */
#root{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  background:#0a0a0a;
}
/* 콘텐츠 박스 — 양옆 선 포함 */
.shell{
  width:100%;
  max-width:1060px;
  min-height:100vh;
  background:#0a0a0a;
  box-sizing:border-box;
  text-align:center;
}
/* 내부 패딩 */
.inner{
  padding:0 50px;
  width:100%;
  box-sizing:border-box;
}
.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:16px 20px 0;
  box-sizing:border-box;
}
/* radial glow 히어로 배경 */
.hero-bg{position:relative;}
.hero-bg::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(204,255,0,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}

/* 2번 섹션 헤더 배경 */
.section-header{display:flex;align-items:stretch;justify-content:center;gap:48px;margin-bottom:24px;background:rgba(204,255,0,.02);border-top:1px solid rgba(204,255,0,.06);border-bottom:1px solid rgba(204,255,0,.06);padding:32px 0;}

/* 3번 서비스 아이콘 박스 */
.service-icon-box{width:30px;height:30px;border-radius:6px;background:rgba(204,255,0,.1);border:1px solid rgba(204,255,0,.2);display:inline-flex;align-items:center;justify-content:center;margin-right:8px;vertical-align:middle;flex-shrink:0;}

/* 4번 모바일 반응형 */
@media(max-width:768px){
  .inner{padding:0 20px;}
  .section-header{flex-direction:column;align-items:flex-start;gap:20px;padding:24px 20px;}
  .grid4{grid-template-columns:repeat(2,1fr);}
  .service-grid{grid-template-columns:1fr;}
  .service-notice{grid-template-columns:1fr;}
  .btn-row{height:auto;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .btn-row a:first-child,.btn-row a:last-child{position:static;transform:none;width:80%;}
  .shell{max-width:100%;}
  h1{font-size:clamp(32px,8vw,56px) !important;}
}
@media(max-width:480px){
  .grid4{grid-template-columns:repeat(2,1fr);}
  .hero-inner{flex-direction:column !important;text-align:center !important;}
}


@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
@keyframes limeGlow{0%,100%{box-shadow:0 0 6px rgba(204,255,0,.2),0 0 12px rgba(204,255,0,.1)}50%{box-shadow:0 0 12px rgba(204,255,0,.4),0 0 24px rgba(204,255,0,.2)}}

/* 섹션 번호 */
.section-num{font-size:11px;color:rgba(204,255,0,.45);font-weight:700;letter-spacing:4px;margin-bottom:6px;}

/* ripple */
.ripple-circle{position:absolute;border-radius:50%;background:rgba(0,0,0,.2);transform:scale(0);animation:rippleAnim .6s linear;pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
.lime-btn{position:relative;overflow:hidden;}



/* 5번 파티클 */
.particle{position:fixed;width:3px;height:3px;background:#CCFF00;border-radius:50%;pointer-events:none;z-index:9990;}

/* 커서 효과 - 점만 */
@media(hover:hover){
  body{cursor:none;}
  #cursor-dot{width:8px;height:8px;background:#CCFF00;border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
}
@media(hover:none){
  #cursor-dot{display:none;}
}

/* 2번 버튼 hover 스케일+글로우 */
.lime-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#CCFF00;color:#0a0a0a;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;transition:transform .2s,box-shadow .2s;white-space:nowrap;}
.lime-btn:hover{transform:scale(1.05);box-shadow:0 0 24px rgba(204,255,0,.4);}

/* 모바일 반응형 */
@media(max-width:768px){
  .inner{padding:0 16px;}
  .shell{max-width:100%;}

  /* 히어로 */
  .hero-bg{padding-top:40px !important;padding-bottom:40px !important;}
  .hero-row{flex-direction:column !important;align-items:center !important;gap:20px !important;text-align:center !important;}
  .hero-row h1{font-size:clamp(36px,9vw,52px) !important;text-align:center;}
  .hero-row p{font-size:clamp(18px,5vw,24px) !important;text-align:center;}

  /* 1번 - 의상 사진만 있으면 폰에서 빛나는 효과 */
  .hero-highlight{
    color:#CCFF00 !important;
    font-weight:900 !important;
    text-shadow:0 0 12px rgba(204,255,0,.8), 0 0 24px rgba(204,255,0,.4);
  }

  /* 섹션 헤더 */
  .section-header{flex-direction:column;align-items:flex-start;gap:16px;padding:24px 16px;background:none;border:none;}
  .section-main-title{font-size:clamp(28px,8vw,42px);word-break:keep-all;}
  .section-sub-title{font-size:clamp(14px,3.5vw,18px) !important;letter-spacing:.08em;}
  .section-num{font-size:10px;letter-spacing:3px;}

  /* 2번 - 불릿 목록 흰색 + 2사이즈 크게 */
  .section-desc-item{font-size:clamp(17px,4.5vw,20px) !important;line-height:2;word-break:keep-all;color:#f0ece4 !important;}

  /* 카드 그리드 */
  .grid4{grid-template-columns:repeat(2,1fr);gap:8px;}

  /* 3번 - 버튼 크기 키우기 */
  .btn-row{height:auto;display:flex;flex-direction:row;gap:8px;justify-content:center;flex-wrap:nowrap;margin-top:16px;padding:0 16px;}
  .btn-row a:first-child,.btn-row a:last-child{position:static;transform:none;flex:none;width:auto;}
  .brand-btn{padding:12px 16px !important;font-size:15px !important;white-space:nowrap;min-width:unset !important;max-width:unset !important;flex:none !important;}

  /* 서비스 */
  .service-wrap{padding:24px 16px;}
  .service-notice{grid-template-columns:1fr;gap:12px;}

  /* 4번 - 소개글 흰색 */
  .service-intro{font-size:17px;margin-bottom:24px;color:#f0ece4 !important;}

  /* 5번 - 준비사항/유의사항 글자 흰색 + 2사이즈 크게 */
  .prep-item{font-size:17px !important;color:#f0ece4 !important;}
  .notice-item{font-size:16px !important;color:#f0ece4 !important;word-break:keep-all;}

  /* 탭 패널 */
  .tab-panel{grid-template-columns:1fr;}
  .tab-title{font-size:20px;}
  .tab-content-inner{padding:0 16px 20px;}
  .tab-btn{padding:18px 16px;}

  /* 6번 - 탭 내부 글자 흰색 + 2사이즈 크게 */
  .tab-content-inner p{font-size:17px !important;color:#f0ece4 !important;line-height:2;}
  .tab-content-inner td{font-size:16px !important;color:#f0ece4 !important;}
  .tab-content-inner li{font-size:17px !important;color:#f0ece4 !important;}

  /* CONTACT */
  .contact-section{padding:48px 20px !important;}

  /* divider */
  .divider{margin:40px 0;}
}

@media(max-width:480px){
  .grid4{grid-template-columns:repeat(2,1fr);gap:6px;}
  .section-main-title{font-size:clamp(26px,7vw,36px);}
  .brand-btn{font-size:14px !important;padding:14px 10px !important;}
}

/* 브랜드 버튼 */
.brand-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:none;border-radius:50px;padding:16px 32px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;transition:transform .2s,opacity .2s;position:relative;overflow:hidden;flex:1;white-space:nowrap;min-width:180px;max-width:220px;}
.brand-btn:hover{transform:scale(1.04);opacity:.9;}
.kakao-btn{background:#FEE500;color:#3C1E1E;}
.tiktok-btn{background:#000;color:#fff;}
.youtube-btn{background:#FF0000;color:#fff;}
@media(max-width:768px){
  .brand-btn{padding:14px 16px;font-size:15px;min-width:unset;max-width:unset;}
}
.tab-panel{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;position:relative;}
.tab-item{border:1px solid rgba(240,236,228,.08);border-radius:16px;overflow:hidden;position:relative;background:rgba(240,236,228,.02);}
.tab-item::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.4),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;z-index:1;}
.tab-btn{width:100%;padding:22px 24px;text-align:left;background:transparent;border:none;cursor:pointer;fontFamily:inherit;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .2s;}
.tab-btn:hover{background:rgba(204,255,0,.04);}
.tab-btn-open{background:rgba(204,255,0,.06);}
.tab-title{font-size:20px;font-weight:900;color:#f0ece4;line-height:1.3;word-break:keep-all;}
.tab-arrow{font-size:12px;color:rgba(204,255,0,.7);flex-shrink:0;}
.tab-content-inner{padding:0 24px 24px;font-size:15px;}

/* 준비사항 가로 배치 */
.prep-grid{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.prep-box{position:relative;border-radius:14px;}
.prep-box::before{content:"";position:absolute;inset:0;border-radius:14px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.5),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;}
.prep-item{display:flex;align-items:center;gap:8px;font-size:16px;color:rgba(240,236,228,.7);}
.prep-item::before{content:"—";color:rgba(204,255,0,.6);flex-shrink:0;}

/* 폰 버전 */
@media(max-width:768px){
  .tab-panel{grid-template-columns:1fr;}
  .tab-title{font-size:18px;}
  .tab-content-inner{padding:0 16px 20px;font-size:14px;}
  .tab-btn{padding:18px 16px;}
  .prep-grid{flex-direction:column;gap:12px;align-items:flex-start;}
  .prep-item{font-size:15px;}

  /* 버튼 크기 키우기 */
  .lime-btn{font-size:15px !important;padding:16px 20px !important;}
  .btn-row{gap:10px !important;}

  /* 글자 크기 더 크게 */
  .section-main-title{font-size:clamp(32px,8vw,44px) !important;}
  .section-sub-title{font-size:clamp(14px,3.5vw,18px) !important;}
  .section-desc-item{font-size:clamp(15px,4vw,18px) !important;line-height:2 !important;}
  .service-intro{font-size:clamp(15px,4vw,17px) !important;}
  .notice-item{font-size:clamp(14px,3.5vw,16px) !important;}
}


.divider{display:flex;align-items:center;gap:16px;margin:72px 0;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:rgba(204,255,0,.2);}
.divider::after{content:"";}
.divider-diamond{width:8px;height:8px;background:#CCFF00;transform:rotate(45deg);flex-shrink:0;box-shadow:0 0 8px rgba(204,255,0,.8),0 0 16px rgba(204,255,0,.4);}

/* 6번 히어로 그리드 배경 */
.hero-bg{background-image:linear-gradient(rgba(204,255,0,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(204,255,0,.03) 1px,transparent 1px);background-size:40px 40px;}

.photo-card{
  position:relative;
  padding-top:177.78%;
  background:#111;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(204,255,0,.3);
  animation:limeGlow 2.5s ease-in-out infinite;
  border:1px solid rgba(204,255,0,.1);
  cursor:pointer;
  transition:border-color .3s, transform .3s;
}
.photo-card:hover{border-color:rgba(204,255,0,.4);transform:translateY(-6px);}
.photo-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.video-card{position:relative;padding-top:177.78%;background:#111;border-radius:18px;overflow:hidden;border:1px solid rgba(204,255,0,.3);animation:limeGlow 2.5s ease-in-out infinite;transition:border-color .3s,transform .3s;}
.video-card:hover{border-color:rgba(204,255,0,.4);transform:translateY(-6px);}
.video-card video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}

/* 3번 - 섹션 타이틀 라임 라인 장식 */
.section-main-title{font-size:clamp(36px,4vw,58px);font-weight:900;line-height:1.15;display:flex;align-items:center;gap:14px;}
.section-main-title::before{content:"";display:block;width:5px;height:clamp(36px,4vw,58px);background:#CCFF00;border-radius:3px;flex-shrink:0;}

/* 5번 - fade-in 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.fade-in{opacity:0;animation:fadeUp .7s ease forwards;}
.fade-in.visible{opacity:1;}

/* 아코디언 */
.accordion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.accordion{border:1px solid rgba(240,236,228,.08);border-radius:16px;overflow:hidden;position:relative;}
.accordion::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.5),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;z-index:1;}
.accordion-header{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;cursor:pointer;background:rgba(240,236,228,.02);transition:background .2s;}
.accordion-header:hover{background:rgba(204,255,0,.04);}
.accordion-title{font-size:16px;font-weight:700;color:#f0ece4;}
.accordion-arrow{font-size:18px;color:#CCFF00;transition:transform .3s;flex-shrink:0;}
.accordion-arrow.open{transform:rotate(180deg);}
.accordion-body{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.accordion-body.open{max-height:800px;}
.accordion-body-inner{padding:0 28px 24px;}
.accordion-body p{font-size:14px;color:rgba(240,236,228,.55);line-height:2;margin-bottom:8px;}
.accordion-body ul{list-style:none;padding:0;}
.accordion-body ul li{font-size:14px;color:rgba(240,236,228,.55);line-height:2;}
.accordion-body ul li::before{content:"·";color:#CCFF00;margin-right:8px;}
.accordion-body table{width:100%;font-size:13px;border-collapse:collapse;margin-top:8px;}
.accordion-body td{padding:10px 12px;border-bottom:1px solid rgba(240,236,228,.06);color:rgba(240,236,228,.55);}
.accordion-body td:first-child{color:rgba(240,236,228,.3);width:40%;}



.lime-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#CCFF00;color:#0a0a0a;border:none;border-radius:50px;padding:16px 48px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;text-decoration:none;transition:opacity .2s;}
.lime-btn:hover{opacity:.85;}

.btn-row a:first-child{position:absolute;left:25%;transform:translateX(-50%);}

.upload-btn{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(204,255,0,.9);color:#0a0a0a;border:none;border-radius:16px;padding:5px 12px;font-size:10px;font-weight:900;cursor:pointer;white-space:nowrap;z-index:3;font-family:inherit;}
.progress-overlay{position:absolute;inset:0;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:4;}
.progress-bar-wrap{width:72%;height:5px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:#CCFF00;border-radius:3px;transition:width .25s;}
.divider{height:1px;background:rgba(240,236,228,.08);margin:72px 0;}
.section-header{display:flex;align-items:stretch;justify-content:center;gap:48px;margin-bottom:24px;}
.section-left{flex-shrink:0;display:flex;flex-direction:column;justify-content:center;text-align:left;}

.section-sub-title{font-size:clamp(16px,2vw,24px);color:rgba(204,255,0,.8);font-weight:700;letter-spacing:.14em;margin-top:8px;}
.section-right{display:flex;flex-direction:column;justify-content:center;}
.section-desc-item{font-size:clamp(15px,1.6vw,20px);color:rgba(240,236,228,.7);line-height:2.2;display:flex;align-items:flex-start;gap:10px;text-align:left;}
.section-desc-item::before{content:"—";color:rgba(204,255,0,.6);flex-shrink:0;font-weight:700;}
.service-wrap{background:rgba(240,236,228,.03);border-radius:20px;padding:40px;text-align:center;position:relative;} .service-wrap::before{content:"";position:absolute;inset:0;border-radius:20px;padding:1px;background:linear-gradient(90deg,rgba(204,255,0,.05),rgba(204,255,0,.5),rgba(204,255,0,.05));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;background-size:200% 100%;animation:shimmer 3s linear infinite;pointer-events:none;}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const CLOUDINARY_CLOUD="ddjdyn0yj";
const CLOUDINARY_PRESET="lod_unsigned";
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbx_SvdtsSxoav9EPFu9UlBMkfjbMeYubKJbd1oDs780TUs3Vx4MnrmqSKYgvSOg7d50Ug/exec";
const IS_ADMIN=new URLSearchParams(location.search).get("admin")==="true";
let KAKAO_LINK="https://open.kakao.com/";
let TIKTOK_LINK="https://www.tiktok.com/@glggid";
let YOUTUBE_LINK="https://www.youtube.com/";
let PHOTO_PRICE1="4,000원";
let PHOTO_PRICE2="3,000원";
let VIDEO_30S="50,000원";
let VIDEO_60S="100,000원";

function loadSheetData(){
  return new Promise(resolve=>{
    const name="load_"+Date.now();
    const s=document.createElement("script");
    const p=new URLSearchParams({callback:name,t:Date.now()});
    s.src=APPS_SCRIPT_URL+"?"+p.toString();
    window[name]=(data)=>{
      delete window[name];
      if(document.body.contains(s))document.body.removeChild(s);
      if(data.kakao_link)KAKAO_LINK=data.kakao_link;
      if(data.tiktok_link)TIKTOK_LINK=data.tiktok_link;
      if(data.youtube_link)YOUTUBE_LINK=data.youtube_link;

      if(data.photo_price2)PHOTO_PRICE2=Number(data.photo_price2).toLocaleString()+"원";

      if(data.video_60s)VIDEO_60S=Number(data.video_60s).toLocaleString()+"원";
      resolve(data);
    };
    s.onerror=()=>{delete window[name];resolve({});};
    setTimeout(()=>{if(window[name]){delete window[name];resolve({});}},5000);
    document.body.appendChild(s);
  });
}

function uploadFile(file,type,onProgress){
  const max=type==="video"?500*1024*1024:20*1024*1024;
  if(file.size>max)return Promise.reject(new Error("파일이 너무 큽니다."));
  return new Promise((resolve,reject)=>{
    const fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset",CLOUDINARY_PRESET);
    const xhr=new XMLHttpRequest();
    xhr.upload.onprogress=e=>{if(e.lengthComputable&&onProgress)onProgress(Math.round(e.loaded/e.total*100));};
    xhr.onload=()=>{const r=JSON.parse(xhr.responseText);if(r.secure_url)resolve(r.secure_url);else reject(new Error("업로드 실패"));};
    xhr.onerror=()=>reject(new Error("연결 오류"));
    xhr.timeout=5*60*1000;
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${type}/upload`);
    xhr.send(fd);
  });
}
function saveToSheet(key,value){
  return new Promise(resolve=>{
    const name="save_"+Date.now();
    const s=document.createElement("script");
    const p=new URLSearchParams({callback:name,action:"update",key,value,t:Date.now()});
    s.src=APPS_SCRIPT_URL+"?"+p.toString();
    window[name]=(res)=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(res);};
    s.onerror=()=>{delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(null);};
    setTimeout(()=>{if(window[name]){delete window[name];if(document.body.contains(s))document.body.removeChild(s);resolve(null);}},8000);
    document.body.appendChild(s);
  });
}

function EditableText({value,onSave,tag,style,className}){
  const Tag=tag||"span";
  const st=style||{};
  const cn=className||"";
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value);
  if(!IS_ADMIN)return <Tag style={st} className={cn}>{value}</Tag>;
  if(editing)return(
    <span style={{position:"relative",display:"inline-block"}}>
      <textarea value={val} onChange={e=>setVal(e.target.value)}
        style={{fontSize:"inherit",fontWeight:"inherit",color:"#0a0a0a",background:"#CCFF00",border:"none",borderRadius:8,padding:"4px 8px",fontFamily:"inherit",width:"100%",minWidth:200,resize:"vertical"}}
        autoFocus/>
      <span style={{display:"flex",gap:6,marginTop:4}}>
        <button onClick={async()=>{await onSave(val);setEditing(false);}} style={{background:"#CCFF00",border:"none",borderRadius:6,padding:"4px 10px",fontWeight:900,cursor:"pointer",fontSize:11}}>저장</button>
        <button onClick={()=>{setVal(value);setEditing(false);}} style={{background:"rgba(255,255,255,.1)",border:"none",borderRadius:6,padding:"4px 10px",color:"#fff",cursor:"pointer",fontSize:11}}>취소</button>
      </span>
    </span>
  );
  return(
    <Tag style={{...st,outline:"1px dashed rgba(204,255,0,.4)",cursor:"pointer",borderRadius:4}} className={cn}
      onClick={()=>setEditing(true)} title="클릭하여 수정">
      {value}
    </Tag>
  );
}

const dot=document.createElement("div");dot.id="cursor-dot";document.body.appendChild(dot);
document.addEventListener("mousemove",e=>{
  dot.style.left=e.clientX+"px";dot.style.top=e.clientY+"px";
});



// 2번 ripple 효과
document.addEventListener("click",function(e){
  const btn=e.target.closest(".lime-btn");
  if(!btn)return;
  const r=document.createElement("span");
  r.className="ripple-circle";
  const rect=btn.getBoundingClientRect();
  const size=Math.max(rect.width,rect.height);
  r.style.width=r.style.height=size+"px";
  r.style.left=(e.clientX-rect.left-size/2)+"px";
  r.style.top=(e.clientY-rect.top-size/2)+"px";
  btn.appendChild(r);
  setTimeout(()=>r.remove(),600);
});

// 5번 파티클
for(let i=0;i<20;i++){
  const p=document.createElement("div");
  p.className="particle";
  const x=Math.random()*window.innerWidth;
  const dur=4+Math.random()*6;
  const delay=Math.random()*6;
  p.style.cssText=`left:${x}px;top:${window.innerHeight}px;opacity:0;transition:none;`;
  document.body.appendChild(p);
  function animParticle(el,startX){
    const drift=(Math.random()-.5)*100;
    el.style.transition=`transform ${dur}s linear, opacity ${dur}s ease`;
    el.style.transform=`translate(${drift}px,-${window.innerHeight+20}px)`;
    el.style.opacity=(Math.random()*.4+.1).toString();
    setTimeout(()=>{
      el.style.transition="none";
      el.style.transform="translate(0,0)";
      el.style.opacity="0";
      el.style.left=Math.random()*window.innerWidth+"px";
      setTimeout(()=>animParticle(el),100);
    },dur*1000);
  }
  setTimeout(()=>animParticle(p,x),delay*1000);
}

const observer=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity="1";e.target.style.transform="translateY(0)";}});
},{threshold:0.15});
document.querySelectorAll(".inner,.service-wrap,.section-header").forEach((el,i)=>{
  el.style.opacity="0";
  el.style.transform="translateY(28px)";
  el.style.transition=`opacity .7s ease ${i*0.1}s, transform .7s ease ${i*0.1}s`;
  observer.observe(el);
});
</script>
